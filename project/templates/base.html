<!DOCTYPE html>
{% load static %}
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{% static 'css/project.css' %}">
    <title>2주차 세션 정리</title>
    <style>
        a {
            text-decoration: none;

        }
        .body-container {
            background-color: #FFF6F2;
            color: #222222;
            margin: 0;
            font-family: sans-serif;
        }
        .navbar-container {
            display: flex;
            align-items: center;
            padding: 20px 32px;
            gap: 40px;
            background-image: url("{% static 'images/bgr.png' %}");
            background-size: cover;
            background-position: center;

        }
        .navbar-link {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
        
        }
        .navbar-link:hover {
            color: #222222;
        }
        .nav-right .navbar-link {
            padding: 8px 14px;
            border-radius: 8px;
            background-color: #E65C00;
            color: white;
        }

        .nav-right {
            margin-left: auto;
        }
        .page-container {
            padding: 40px 48px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            margin: 0 0 8px;
            text-align: center;
        }
        .welcome {
            font-size: 32px;
            margin: 0 0 40px;
            text-align: center;
            padding-bottom: 100px;
        }
        .section-title {
            color: #ff96bb;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .section {
            border-left: 3px solid #ff96bb;
            padding-left: 16px;
            margin-bottom: 28px;
        }
        .section ul {
            margin: 0;
            padding-left: 20px;
            color: #555555;
        }
        .section li {
            margin-bottom: 6px;
        }
    </style>
</head>

<body class="body-container">

    {% include 'shared/_navbar.html' %}
       <p class="ig"><img src="{% static 'images/ccco.png' %}" alt="up" width="100px"></p>
    {% block content %}
    {% endblock %}  
       <p class="ig"><img src="{% static 'images/cccd.png' %}" alt="down" width="100px"></p>
 

</body>
</html>
